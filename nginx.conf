worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # keep all writable paths under /tmp so nginx can run as a non-root user
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    sendfile      on;
    tcp_nopush    on;
    server_tokens off;

    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml;

    server {
        listen      8080;
        server_name _;
        root        /usr/share/nginx/html;
        index       index.html;

        # Content-hashed build assets are immutable — cache them hard.
        location /assets/ {
            expires    1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Everything else (index.html, sw.js, registerSW.js, the manifest and the
        # PWA icons) must revalidate so new releases roll out: the service worker
        # and app shell are always re-fetched, then Workbox swaps the precache.
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache";
            add_header X-Content-Type-Options nosniff;
            add_header X-Frame-Options SAMEORIGIN;
            add_header Referrer-Policy strict-origin-when-cross-origin;
        }
    }
}
